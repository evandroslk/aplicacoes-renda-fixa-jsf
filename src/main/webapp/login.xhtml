<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="icon" type="image/x-icon" href="#{request.contextPath}/favicon.ico" />
    <title>Login - Aplicações Renda Fixa</title>
    <style>
        :root {
            --primary: #1a365d;
            --primary-light: #2c5282;
            --accent: #38a169;
            --accent-hover: #2f855a;
            --surface: #ffffff;
            --text: #2d3748;
            --text-muted: #718096;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 50%, #1a365d 100%);
            min-height: 100vh;
            padding: 1rem;
            color: var(--text);
        }

        .login-container {
            max-width: 380px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 2rem);
            animation: fadeInUp 0.6s ease-out;
        }

        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-header h1 {
            color: white;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .login-header h1::before {
            content: '';
            width: 6px;
            height: 28px;
            background: var(--accent);
            border-radius: 3px;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        .login-card {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        .login-card-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            padding: 1rem 1.5rem;
            color: white;
        }

        .login-card-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .login-card-body {
            padding: 1.5rem;
        }

        .login-card-body form {
            display: flex;
            flex-direction: column;
        }

        .login-card-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .login-card-header h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent);
            border-radius: 2px;
        }

        .login-card-body {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
            display: block;
            margin-bottom: 0.4rem;
        }

        .form-group .p-outputlabel {
            display: block;
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
        }

        .form-group .p-inputtext,
        .form-group .p-password .p-inputtext {
            width: 100%;
            padding: 0.7rem 0.85rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s ease;
            background: #f7fafc;
            box-sizing: border-box;
        }

        .form-group .p-inputtext:focus,
        .form-group .p-password .p-inputtext:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.1);
            outline: none;
            background: white;
        }

        .form-group .p-inputtext:hover,
        .form-group .p-password .p-inputtext:hover {
            border-color: var(--primary-light);
        }

        .form-group .p-password {
            width: 100%;
            display: block;
        }

        .login-button {
            width: 100%;
            padding: 0.7rem 1.5rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(56, 161, 105, 0.3);
            margin-top: 0.5rem;
            height: auto;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(56, 161, 105, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button .ui-button-text {
            padding: 0;
        }

        .login-footer {
            text-align: center;
            margin-top: 1rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
        }

        .login-footer strong {
            color: white;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</h:head>

<h:body>
    <div class="login-container">
        <div class="login-header">
            <h1>
                <i class="pi pi-chart-line" style="font-size: 1.5rem;"></i>
                Aplicações Renda Fixa
            </h1>
            <p>Faça login para continuar</p>
        </div>

        <div class="login-card">
            <div class="login-card-header">
                <h2>
                    <i class="pi pi-sign-in"></i>
                    Acesso ao Sistema
                </h2>
            </div>
            <div class="login-card-body">
                <h:form id="formLogin">

                    <p:focus for="usuario"/>
                    
                    <p:defaultCommand target="btnLogin"/>

                    <p:messages id="messages" showDetail="true" showSummary="false" closable="true"  />

                    <div class="form-group">
                        <p:outputLabel for="usuario" value="Usuário" />
                        <p:inputText id="usuario" 
                                     value="#{loginBean.username}" 
                                     required="true"
                                     requiredMessage="Usuário é obrigatório"
                                     placeholder="Digite seu usuário"
                                     styleClass="w-full" />
                    </div>
                    
                    <div class="form-group">
                        <p:outputLabel for="senha" value="Senha" />
                        <p:password id="senha" 
                                    value="#{loginBean.password}" 
                                    required="true"
                                    requiredMessage="Senha é obrigatória"
                                    placeholder="Digite sua senha"
                                    feedback="false"
                                    styleClass="w-full" />
                    </div>
                    
                    <p:commandButton id="btnLogin"
                                     value="Entrar" 
                                     action="#{loginBean.login}" 
                                     update="@form"
                                     styleClass="login-button"
                                     ajax="false" />
                </h:form>
            </div>
        </div>
    </div>
</h:body>

</html>
